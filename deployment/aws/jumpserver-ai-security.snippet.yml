# Copy these keys into JumpServer config.yml (or use connect-jumpserver.sh).
# Real-time path: JumpServer → HTTP webhook → CyberVault on same host :8090

AI_SECURITY_ENABLED: true
AI_SECURITY_PUBLISHER: http
AI_SECURITY_WEBHOOK_URL: http://127.0.0.1:8090/events
AI_SECURITY_WEBHOOK_TOKEN: ""
AI_SECURITY_WEBHOOK_TIMEOUT: 3

# Alternatives for same-host POC:
# AI_SECURITY_PUBLISHER: redis
# AI_SECURITY_REDIS_CHANNEL: fm.security_events
#
# File mode (debug only):
# AI_SECURITY_PUBLISHER: file
# AI_SECURITY_FILE_PATH: data/ai_security/events.jsonl
